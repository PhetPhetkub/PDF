<!DOCTYPE html>
<html>
<head>
    <title>ฟรี PDF to Word</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center justify-center p-5">
    <div class="max-w-xl w-full bg-slate-800 p-10 rounded-3xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-center mb-8">แปลง PDF เป็น Word 📄➡️📝</h1>
        
        <div id="drop-zone" class="border-2 border-dashed border-slate-500 rounded-2xl p-12 text-center hover:border-blue-500 transition-all cursor-pointer bg-slate-700/50">
            <p class="text-lg">ลากไฟล์ PDF มาวางที่นี่</p>
            <p class="text-sm text-slate-400 mt-2">หรือคลิกเพื่อเลือกไฟล์</p>
            <input type="file" id="file-input" class="hidden" accept=".pdf">
        </div>

        <div id="loader" class="hidden mt-8 text-center">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent"></div>
            <p class="mt-4 text-blue-400">กำลังแปลงไฟล์... (อาจใช้เวลา 1-2 นาทีถ้าไฟล์ใหญ่)</p>
        </div>

        <div id="result" class="hidden mt-8 text-center">
            <a id="download-link" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full transition-all cursor-pointer">
                📥 ดาวน์โหลดไฟล์ Word
            </a>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        const downloadLink = document.getElementById('download-link');

        // กลับมาใช้ลิงก์เดิมที่ทำงานได้ดี
        const API_URL = "https://pdf-x141.onrender.com/convert";

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-slate-600'); };
        dropZone.ondragleave = () => dropZone.classList.remove('bg-slate-600');
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file || file.type !== 'application/pdf') return alert('ขอเป็นไฟล์ PDF นะครับ');
            
            loader.classList.remove('hidden');
            result.classList.add('hidden');
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(API_URL, { method: 'POST', body: formData });
                
                if (!response.ok) throw new Error('Network response was not ok');

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                downloadLink.href = url;
                downloadLink.download = file.name.replace(".pdf", ".docx");
                result.classList.remove('hidden');
            } catch (error) {
                alert('เกิดข้อผิดพลาด ลองตรวจสอบว่า Server หลังบ้านทำงานปกติหรือไม่ครับ');
                console.error('Error:', error);
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
